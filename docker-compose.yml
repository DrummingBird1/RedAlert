version: '3.8'

services:
  alertmap:
    build: .
    container_name: alertmap
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - ADMIN_USER=${ADMIN_USER:-admin}
      # Leave ADMIN_PASS unset to let the server generate a random one (printed in logs),
      # or set it in a .env file / your shell for a stable password.
      - ADMIN_PASS=${ADMIN_PASS:-}
      - FALLBACK_ALERT_URL=${FALLBACK_ALERT_URL:-}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHANNEL=${TELEGRAM_CHANNEL:-}
      - HEALTH_WEBHOOK=${HEALTH_WEBHOOK:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Telegram bot (uncomment to enable)
